<!DOCTYPE html>
<!--
  EVENT REGISTRATION PAGE (Site 2, numbers + text under title, buttons under counters)
  - Event title and numbers load from /api/config.
  - Going/Interesting: text turns red, then number updates after short delay; Going scrolls to form.
  - Guest counter: + (adds 1, then 2, ... up to 10 per click) and - (subtract 1).
  - Form data can be sent to Google Sheet: set REGISTRATION_SCRIPT_URL below.
  - Birthday: plain text field so user can type date manually (e.g. 15/03/1990 or 1990-03-15).
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Events page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0066FF;
            color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .event-title {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-top: 16px;
            margin-bottom: 20px;
            color: #FFFFFF;
        }

        .buttons-row {
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
            margin-bottom: 12px;
        }

        .btn-action {
            flex: 1;
            max-width: 180px;
            background-color: #00C896;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .btn-action:active {
            transform: scale(0.97);
        }

        .main-counters {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            margin-bottom: 16px;
        }

        .main-counter-box {
            flex: 1;
            text-align: center;
        }

        .main-counter-label {
            font-size: 16px;
            margin-top: 4px;
            color: #FFFFFF;
        }

        .counter-above {
            font-size: 20px;
            font-weight: bold;
            color: #FFFFFF;
            text-align: center;
            transition: color 0.25s;
        }

        .counter-above.highlight-red {
            color: #FFFFFF;
        }

        .counter-above.highlight-red .counter-number {
            color: #ff4444;
        }

        .form-section {
            width: 100%;
            max-width: 420px;
            margin-top: 12px;
            padding-bottom: 40px;
        }

        .form-field {
            width: 100%;
            background-color: #E0E0E0;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            color: #333;
            margin-bottom: 14px;
            font-family: inherit;
        }

        .form-field::placeholder {
            color: #666;
        }

        .form-field:focus {
            outline: 2px solid #00C896;
            outline-offset: 2px;
        }

        select.form-field {
            cursor: pointer;
            appearance: auto;
        }

        .guest-counter-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 12px;
            background-color: rgba(255,255,255,0.15);
            border-radius: 12px;
            width: 100%;
        }

        .guest-counter-box label {
            font-size: 14px;
            color: rgba(255,255,255,0.95);
            margin-right: 8px;
        }

        .guest-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            background-color: #00C896;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            transition: opacity 0.2s;
        }

        .guest-btn:hover {
            opacity: 0.9;
        }

        .guest-btn:active {
            transform: scale(0.95);
        }

        .guest-num {
            font-size: 20px;
            font-weight: bold;
            min-width: 36px;
            text-align: center;
        }

        .optional-small {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 4px;
            display: block;
        }

        .btn-send {
            width: 100%;
            background-color: #2196F3;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.2s;
            position: relative;
        }

        .btn-send:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .spinner {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }

        .spinner.show {
            display: block;
        }

        .btn-send .btn-text {
            display: block;
        }

        .btn-send.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-msg {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: rgba(0,200,150,0.3);
            border-radius: 12px;
            margin-top: 16px;
        }

        .success-msg.show {
            display: block;
        }

        @media (max-width: 480px) {
            .event-title { font-size: 22px; }
            .btn-action { font-size: 15px; padding: 12px 16px; }
            .main-counters { flex-direction: row; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="event-title">Waiting for the Text...</h1>

        <!-- counters directly under the title -->
        <div class="main-counters">
            <div class="main-counter-box">
                <div class="counter-above" id="going-counter-above">
                    <span id="going-num" class="counter-number">...</span>
                </div>
                <div class="main-counter-label">People Going</div>
            </div>
            <div class="main-counter-box">
                <div class="counter-above" id="interesting-counter-above">
                    <span id="interesting-num" class="counter-number">...</span>
                </div>
                <div class="main-counter-label">People Interesting</div>
            </div>
        </div>

        <!-- buttons moved below counters -->
        <div class="buttons-row">
            <button type="button" class="btn-action" id="btn-going">Going</button>
            <button type="button" class="btn-action" id="btn-interesting">Interesting</button>
        </div>

        <section class="form-section" id="form-section">
            <form id="reg-form" onsubmit="return handleSubmit(event)">
                <input type="text" class="form-field" id="fullname" placeholder="Your Full name?" required>

                <div class="guest-counter-box">
                    <label for="guest-num">Number of people coming with you</label>
                    <button type="button" class="guest-btn" id="guest-minus" aria-label="Minus">−</button>
                    <span class="guest-num" id="guest-num">0</span>
                    <button type="button" class="guest-btn" id="guest-plus" aria-label="Plus">+</button>
                </div>

                <label class="optional-small">(optionally)</label>
                <select class="form-field" id="level" required>
                    <option value="">Select your level</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                </select>

                <input type="text" class="form-field" id="birthday" placeholder="Your Birthday (Example 15/03/1990)" required>

                <input type="text" class="form-field" id="instagram" placeholder="Instagram Username to Send you confirmation?" required>

                <select class="form-field" id="dance-choice" required>
                    <option value="">Select dance preference</option>
                    <option value="sensual bachata">sensual bachata</option>
                    <option value="Cuban salsa">Cuban salsa</option>
                    <option value="both salsa and bachata">both salsa and bachata</option>
                    <option value="only for start with bachata">only for start with bachata</option>
                    <option value="the dance teacher decides and i see which one i like more">the dance teacher decides and i see which one i like more</option>
                </select>

                <button type="submit" class="btn-send" id="btn-send">
                    <span class="spinner" id="spinner"></span>
                    <span class="btn-text">send</span>
                </button>
            </form>

            <div class="success-msg" id="success-msg">
                Thank you! Your registration has been submitted.
            </div>
        </section>
    </div>

    <script>
        (function() {
            var CONFIG_SCRIPT_URL = '/api/config';
            var REGISTRATION_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygLpKC6L7Dv0d14sHVH4jko96gnnogorboU_R66AqHkXBCcCm5gEna83Gx6xZvJYNuuA/exec';
            var DELAY_BEFORE_COUNT = 500;
            var DELAY_BEFORE_SCROLL = 900;

            var state = {
                goingNum: 187,
                goingPlus: 184,
                interestingNum: 34,
                interestingPlus: 31
            };

            var goingSelected = false;
            var interestingSelected = false;

            var guestCount = 0;
            var plusStep = 1;

            function updateDisplay() {
                document.getElementById('going-num').textContent = state.goingNum;
                document.getElementById('interesting-num').textContent = state.interestingNum;
            }

            function updateGuestDisplay() {
                document.getElementById('guest-num').textContent = guestCount;
            }

            function scrollToForm() {
                document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function onGoing() {
                goingSelected = !goingSelected;
                if (goingSelected) {
                    var el = document.getElementById('going-counter-above');
                    el.classList.add('highlight-red');
                    setTimeout(function() {
                        state.goingNum += 1;
                        state.goingPlus += 1;
                        updateDisplay();
                    }, DELAY_BEFORE_COUNT);
                    setTimeout(scrollToForm, DELAY_BEFORE_SCROLL);
                } else {
                    state.goingNum -= 1;
                    state.goingPlus -= 1;
                    updateDisplay();
                    document.getElementById('going-counter-above').classList.remove('highlight-red');
                }
            }

            function onInteresting() {
                interestingSelected = !interestingSelected;
                if (interestingSelected) {
                    var el = document.getElementById('interesting-counter-above');
                    el.classList.add('highlight-red');
                    setTimeout(function() {
                        state.interestingNum += 1;
                        state.interestingPlus += 1;
                        updateDisplay();
                    }, DELAY_BEFORE_COUNT);
                } else {
                    state.interestingNum -= 1;
                    state.interestingPlus -= 1;
                    updateDisplay();
                    document.getElementById('interesting-counter-above').classList.remove('highlight-red');
                }
            }

            document.getElementById('btn-going').addEventListener('click', onGoing);
            document.getElementById('btn-interesting').addEventListener('click', onInteresting);

            document.getElementById('guest-plus').addEventListener('click', function() {
                guestCount += plusStep;
                if (plusStep < 10) plusStep += 1;
                updateGuestDisplay();
            });

            document.getElementById('guest-minus').addEventListener('click', function() {
                if (guestCount > 0) guestCount -= 1;
                updateGuestDisplay();
            });

            window.handleSubmit = function(ev) {
                ev.preventDefault();
                var btn = document.getElementById('btn-send');
                var spinner = document.getElementById('spinner');
                var form = document.getElementById('reg-form');
                var success = document.getElementById('success-msg');

                btn.classList.add('loading');
                btn.disabled = true;
                spinner.classList.add('show');

                var data = {
                    fullName: document.getElementById('fullname').value,
                    birthday: document.getElementById('birthday').value,
                    instagram: document.getElementById('instagram').value,
                    reason: '',
                    guestCount: guestCount,
                    level: document.getElementById('level').value,
                    danceChoice: document.getElementById('dance-choice').value
                };

                if (REGISTRATION_SCRIPT_URL) {
                    fetch(REGISTRATION_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).catch(function() {});
                }

                setTimeout(function() {
                    spinner.classList.remove('show');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    form.style.display = 'none';
                    success.classList.add('show');
                    form.reset();
                    guestCount = 0;
                    plusStep = 1;
                    updateGuestDisplay();
                }, 2000);

                return false;
            };

            function applyConfig(data) {
                if (data && data.eventTitle != null) document.querySelector('.event-title').textContent = data.eventTitle;
                if (data && data.goingNum != null) state.goingNum = Number(data.goingNum);
                if (data && data.goingPlus != null) state.goingPlus = Number(data.goingPlus);
                if (data && data.interestingNum != null) state.interestingNum = Number(data.interestingNum);
                if (data && data.interestingPlus != null) state.interestingPlus = Number(data.interestingPlus);
                updateDisplay();
            }
            if (CONFIG_SCRIPT_URL) {
                fetch(CONFIG_SCRIPT_URL).then(function(r) { return r.json(); }).then(applyConfig).catch(function() { updateDisplay(); });
            } else {
                updateDisplay();
            }
            updateGuestDisplay();
        })();
    </script>
</body>
</html>
